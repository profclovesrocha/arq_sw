<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}IMIP - Apoio à decisão{% endblock %}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" integrity="sha384-xxxxx" crossorigin="anonymous" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
</head>
<body>
<nav class="navbar">
  <div class="navbar">
    <a class="navbar-brand" href="/">IMIP Escolar</a>
   
    <div class="collapse navbar-collapse" id="navbarNav">
      <div class="a-header">
        <a class="nav-link" href="/">Planos</a> |
        <a class="nav-link" href="/plans/new">Criar Plano</a> |
        <a class="nav-link" href="/students">Alunos</a> |
        <a class="nav-link" href="/teachers">Professores</a>
      </div>
      
    </div>
  </div>
</nav>
<div class="container">
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      {% for category, message in messages %}
        <div class="alert alert-{{ 'danger' if category == 'danger' else ('warning' if category == 'warning' else 'success') }}">{{ message }}</div>
      {% endfor %}
    {% endif %}
  {% endwith %}

  {% block content %}{% endblock %}
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
</body>
</html>
