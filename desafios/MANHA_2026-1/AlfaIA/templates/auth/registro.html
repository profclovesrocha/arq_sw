<!DOCTYPE html>
<html lang="pt-BR">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cadastro - AlfaIA — IMIP</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Segoe UI",system-ui,sans-serif;background:linear-gradient(135deg,#0f172a,#1e3a5f);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem}
.box{background:#fff;border-radius:16px;padding:36px;width:100%;max-width:420px;box-shadow:0 20px 60px rgba(0,0,0,.3)}
h1{font-size:20px;font-weight:700;color:#1e3a5f;text-align:center;margin-bottom:4px}
.sub{font-size:13px;color:#64748b;text-align:center;margin-bottom:24px}
.form-group{margin-bottom:14px}
label{display:block;font-size:13px;font-weight:600;margin-bottom:5px;color:#374151}
input,select{width:100%;padding:10px 12px;border:1px solid #d1d5db;border-radius:8px;font-size:14px}
input:focus,select:focus{outline:none;border-color:#3b82f6;box-shadow:0 0 0 3px rgba(59,130,246,.12)}
.btn{width:100%;padding:11px;border-radius:8px;font-size:14px;font-weight:600;border:none;cursor:pointer;background:#059669;color:#fff;margin-top:6px}
.link{text-align:center;margin-top:16px;font-size:13px;color:#64748b}
.link a{color:#1d4ed8;text-decoration:none;font-weight:500}
.alert{padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:14px;background:#FEE2E2;color:#991b1b;border-left:4px solid #dc2626}
</style></head>
<body>
<div class="box">
  <h1>&#127891; Novo cadastro</h1>
  <p class="sub">Crie sua conta no AlfaIA — IMIP</p>
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for cat, msg in messages %}<div class="alert">{{ msg }}</div>{% endfor %}
  {% endwith %}
  <form method="POST">
    <div class="form-group"><label>Nome de usuario</label><input type="text" name="username" required></div>
    <div class="form-group"><label>E-mail</label><input type="email" name="email" required></div>
    <div class="form-group"><label>Senha</label><input type="password" name="password" required minlength="6"></div>
    <div class="form-group"><label>Papel</label>
      <select name="role">
        <option value="professor">Professor</option>
        <option value="extensionista">Extensionista</option>
        <option value="coordenador">Coordenador</option>
      </select>
    </div>
    <button type="submit" class="btn">Criar conta</button>
  </form>
  <div class="link">Ja tem conta? <a href="{{ url_for("auth.login") }}">Faca login</a></div>
</div>
</body></html>
