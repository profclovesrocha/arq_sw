<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - AlfabetizaIA</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/registro.css') }}">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <h2>📝 Criar Conta</h2>
                <p>Junte-se a nós no AlfabetizaIA!</p>
            </div>

            <!-- Mensagens de Flash -->
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    <div class="alert-container">
                        {% for categoria, mensagem in messages %}
                            <div class="alert alert-{{ categoria }}">{{ mensagem }}</div>
                        {% endfor %}
                    </div>
                {% endif %}
            {% endwith %}

            <form method="POST">
                <!-- Escolha de Perfil -->
                <label class="form-label">Quem é você?</label>
                <div class="profile-selection">
                    <div class="profile-option">
                        <input type="radio" name="perfil" id="perfil_aluno" value="aluno" checked>
                        <label for="perfil_aluno" class="profile-label">🎓 Aluno</label>
                    </div>
                    <div class="profile-option">
                        <input type="radio" name="perfil" id="perfil_professor" value="professor">
                        <label for="perfil_professor" class="profile-label">👨‍🏫 Professor</label>
                    </div>
                </div>

                <div class="form-row">
                    <!-- Nome -->
                    <div class="form-group">
                        <label class="form-label" for="nome">Nome Completo</label>
                        <input type="text" id="nome" name="nome" class="form-control" placeholder="Digite seu nome" required>
                    </div>

                    <!-- E-mail -->
                    <div class="form-group">
                        <label class="form-label" for="email">E-mail</label>
                        <input type="email" id="email" name="email" class="form-control" placeholder="exemplo@email.com" required>
                    </div>
                </div>

                <div class="form-row">
                    <!-- Telefone -->
                    <div class="form-group">
                        <label class="form-label" for="telefone">Telefone</label>
                        <input type="tel" id="telefone" name="telefone" class="form-control" placeholder="(00) 00000-0000" required>
                    </div>

                    <!-- CPF -->
                    <div class="form-group">
                        <label class="form-label" for="cpf">CPF</label>
                        <input type="text" id="cpf" name="cpf" class="form-control" placeholder="000.000.000-00" required>
                    </div>
                </div>

                <div class="form-row">
                    <!-- Matrícula -->
                    <div class="form-group">
                        <label class="form-label" for="matricula">Matrícula</label>
                        <input type="text" id="matricula" name="matricula" class="form-control" placeholder="Digite sua matrícula" required>
                    </div>

                    <!-- Campo condicional Aluno: Turma -->
                    <div class="form-group conditional-field" id="field_turma">
                        <label class="form-label" for="turma">Turma</label>
                        <input type="text" id="turma" name="turma" class="form-control" placeholder="Ex: 2º Ano A">
                    </div>

                    <!-- Campo condicional Professor: Disciplina -->
                    <div class="form-group conditional-field" id="field_disciplina">
                        <label class="form-label" for="disciplina">Disciplina</label>
                        <input type="text" id="disciplina" name="disciplina" class="form-control" placeholder="Ex: Português">
                    </div>
                </div>

                <div class="form-row">
                    <!-- Senha -->
                    <div class="form-group">
                        <label class="form-label" for="senha">Senha</label>
                        <input type="password" id="senha" name="senha" class="form-control" placeholder="Crie uma senha" required>
                    </div>

                    <!-- Confirmar Senha -->
                    <div class="form-group">
                        <label class="form-label" for="confirmar_senha">Confirmar Senha</label>
                        <input type="password" id="confirmar_senha" name="confirmar_senha" class="form-control" placeholder="Repita a senha" required>
                    </div>
                </div>

                <button type="submit" class="btn-submit">Registrar</button>
            </form>

            <div class="auth-footer">
                Já tem uma conta? <a href="{{ url_for('auth.login') }}">Entrar</a>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/registro.js') }}"></script>
</body>
</html>
