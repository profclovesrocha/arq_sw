    <h2>Registrar Usuário:</h2>

    <form action="/registrar" method="post">
<div class="mb-3">

</div>

</div>

    <input type="checkbox" class="form-check-input" id="exampleCheck1" required>

<input type="submit" class="btn btn-primary" value="Registrar">
