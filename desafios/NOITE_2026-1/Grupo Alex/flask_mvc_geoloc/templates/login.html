<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Recicla</title>
    <style>
        :root {
            --green-primary: #2d6a4f; /* Verde Floresta Profundo */
            --green-secondary: #40916c; /* Verde Musgo Vibrante */
            --green-tertiary: #b7e4c7; /* Verde Chá Pálido */
            --green-light: #d8f3dc; /* Verde Quase Branco */
            --earth-brown: #a67c52; /* Marrom Suave para Destaques */
            --text-dark: #1b4332;
            --white: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: var(--green-light);
            background-image: 
                radial-gradient(at 10% 10%, rgba(183, 228, 199, 0.3) 0px, transparent 50%),
                radial-gradient(at 90% 90%, rgba(64, 145, 108, 0.2) 0px, transparent 50%);
            /* Opcional: Adicionar uma textura leve de papel ou folha de fundo */
        }

        .login-container {
            background: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(27, 67, 50, 0.15);
            width: 320px;
            border: 2px solid var(--green-tertiary);
            position: relative;
            overflow: hidden;
        }

        /* Elemento decorativo orgânico sutil */
        .login-container::before {
            content: '';
            position: absolute;
            top: -50px;
            right: -50px;
            width: 100px;
            height: 100px;
            background-color: var(--green-tertiary);
            border-radius: 50%;
            opacity: 0.4;
            z-index: 0;
        }

        h2 {
            margin-bottom: 25px;
            text-align: center;
            color: var(--green-primary);
            font-weight: 600;
            position: relative;
            z-index: 1;
        }

        /* Ícone simples antes do título (opcional) */
        h2::before {
            content: '🍃';
            margin-right: 10px;
            font-size: 0.9em;
        }

        .input-group {
            position: relative;
            margin-bottom: 15px;
            z-index: 1;
        }

        input {
            width: 100%;
            padding: 12px 15px;
            margin: 8px 0;
            box-sizing: border-box;
            border: 1px solid var(--green-tertiary);
            border-radius: 8px;
            background-color: var(--white);
            color: var(--text-dark);
            font-size: 15px;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        input:focus {
            outline: none;
            border-color: var(--green-secondary);
            box-shadow: 0 0 0 3px rgba(64, 145, 108, 0.2);
        }

        /* Estilização para os ícones/labels flutuantes (opcional, requer mais JS/CSS avançado) */
        /* Para simplicidade, usaremos apenas placeholders orgânicos */

        input::placeholder {
            color: #8da99d;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: var(--green-primary);
            color: var(--white);
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: background-color 0.3s, transform 0.1s;
            position: relative;
            z-index: 1;
            margin-top: 10px;
        }

        button:hover {
            background-color: var(--green-secondary);
        }

        button:active {
            transform: translateY(1px);
        }

        .flash {
            color: #873636; /* Um marrom-avermelhado para erro, combina com a terra */
            background-color: #f8d7da;
            border: 1px solid #f5c6cb;
            text-align: center;
            margin-bottom: 15px;
            padding: 10px;
            border-radius: 8px;
            font-size: 14px;
            position: relative;
            z-index: 1;
        }
        
        .footer-note {
            text-align: center;
            font-size: 12px;
            color: #8da99d;
            margin-top: 20px;
            position: relative;
            z-index: 1;
        }
    </style>
</head>
<body>

<div class="login-container">
    <h2>Acessar o Mapa</h2>
    
    {% with messages = get_flashed_messages() %}
      {% if messages %}
        {% for message in messages %}
          <div class="flash">{{ message }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form method="POST" action="{{ url_for('auth.login') }}">
        <div class="input-group">
            <input type="text" name="username" placeholder="Seu nome de usuário florestal" required>
        </div>
        <div class="input-group">
            <input type="password" name="password" placeholder="Sua senha raiz" required>
        </div>
        <button type="submit">Localizar Ponto mais próximo</button>
    </form>
    
    <div class="footer-note">Recicla</div>
</div>

</body>
</html>
