<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Dashboard - Geolocalização</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 40px; background-color: #f8f9fa; text-align: center; }
        .card { background: white; padding: 30px; border-radius: 8px; display: inline-block; box-shadow: 0 4px 6px rgba(0,0,0,0.05); min-width: 350px; }
        .btn-logout { display: inline-block; margin-top: 20px; color: #dc3545; text-decoration: none; }
        .status { margin: 15px 0; font-weight: bold; color: #555; }
    </style>
</head>
<body>

<div class="card">
    <h2>Bem-vindo, {{ username }}!</h2>
    <p>Solicitando acesso aos sensores do seu dispositivo...</p>
    
    <div id="status-geo" class="status">Aguardando permissão...</div>
    
    <div id="coordenadas" style="display:none;">
        <p><strong>Latitude:</strong> <span id="lat"></span></p>
        <p><strong>Longitude:</strong> <span id="lon"></span></p>
    </div>

    <a href="{{ url_for('auth.logout') }}" class="btn-logout">Sair do sistema</a>
</div>

<script>
    // Executa assim que a página carrega
    document.addEventListener("DOMContentLoaded", function() {
        const statusText = document.getElementById("status-geo");
        const coordDiv = document.getElementById("coordenadas");

        // Verifica se o navegador tem suporte a Geolocalização
        if (!navigator.geolocation) {
            statusText.innerText = "Geolocalização não é suportada pelo seu navegador.";
            return;
        }

        statusText.innerText = "Localizando dispositivo...";

        // Captura a posição atual
        navigator.geolocation.getCurrentPosition(
            (position) => {
                const lat = position.coords.latitude;
                const lon = position.coords.longitude;

                // Atualiza a View (HTML)
                document.getElementById("lat").innerText = lat;
                document.getElementById("lon").innerText = lon;
                statusText.innerText = "Localização capturada com sucesso!";
                coordDiv.style.display = "block";

                // Envia os dados de volta para o Servidor (Controller) via Fetch API
                fetch("/api/save-geo", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ latitude: lat, longitude: lon })
                })
                .then(response => response.json())
                .then(data => console.log("Resposta do servidor:", data))
                .catch(error => console.error("Erro ao enviar para o servidor:", error));
            },
            (error) => {
                // Tratamento de erros/recusas de permissão
                switch(error.code) {
                    case error.PERMISSION_DENIED:
                        statusText.innerText = "Usuário rejeitou a solicitação de Geolocalização.";
                        break;
                    case error.POSITION_UNAVAILABLE:
                        statusText.innerText = "Informações de localização indisponíveis.";
                        break;
                    case error.TIMEOUT:
                        statusText.innerText = "A requisição expirou.";
                        break;
                    default:
                        statusText.innerText = "Erro desconhecido ao obter localização.";
                }
            }
        );
    });
</script>

</body>
</html>
