<div
  class="flex items-center justify-center w-16 h-16 rounded-full bg-white transition-all"
  [style.border]="desbloqueada() ? '3px solid ' + corAccent() : '3px solid #D1D5DB'"
  [style.opacity]="desbloqueada() ? '1' : '0.4'"
  [attr.aria-label]="nome() + (desbloqueada() ? ' — desbloqueada' : ' — bloqueada')"
  role="img"
>
  <span
    class="text-2xl"
    [style.filter]="desbloqueada() ? 'none' : 'grayscale(1)'"
  >{{ icone() }}</span>
</div>
