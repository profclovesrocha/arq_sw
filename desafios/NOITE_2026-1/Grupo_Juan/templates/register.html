<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ravix — Cadastro</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Quicksand:wght@600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <style>
    :root { --primary: #3d8ef0; --secondary: #e74c8b; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Nunito', sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #f0f4ff 0%, #e8f0fe 100%);
      display: flex; align-items: center; justify-content: center;
      padding: 40px 20px;
    }
    .register-card {
      background: white; border-radius: 24px;
      box-shadow: 0 20px 60px rgba(61,142,240,0.15);
      width: 100%; max-width: 520px;
      padding: 48px 44px;
    }
    .brand {
      display: flex; align-items: center; gap: 12px;
      margin-bottom: 32px;
    }
    .brand-icon {
      width: 48px; height: 48px;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      color: white; font-size: 1.2rem;
    }
    .brand h1 {
      font-family: 'Quicksand', sans-serif; font-weight: 800;
      font-size: 1.6rem; color: var(--primary);
    }
    h2 { font-size: 1.5rem; font-weight: 900; color: #1e293b; margin-bottom: 6px; }
    .subtitle { color: #64748b; font-size: 0.9rem; font-weight: 600; margin-bottom: 28px; }

    /* Role toggle */
    .role-toggle {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 12px; margin-bottom: 24px;
    }
    .role-option { display: none; }
    .role-label {
      display: flex; flex-direction: column; align-items: center; gap: 8px;
      padding: 16px 12px; border: 2px solid #e5e7eb; border-radius: 14px;
      cursor: pointer; transition: all 0.2s; text-align: center;
    }
    .role-label .ri { font-size: 1.5rem; }
    .role-label span { font-weight: 800; font-size: 0.88rem; color: #374151; }
    .role-label small { font-size: 0.75rem; color: #9ca3af; font-weight: 600; }
    .role-option:checked + .role-label {
      border-color: var(--primary);
      background: #eff6ff;
      color: var(--primary);
    }
    .role-option:checked + .role-label span { color: var(--primary); }

    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .form-grid .full { grid-column: 1 / -1; }

    .form-group { margin-bottom: 18px; }
    .form-group label {
      display: block; font-weight: 700; font-size: 0.83rem;
      color: #374151; margin-bottom: 6px;
    }
    .input-wrap { position: relative; }
    .input-wrap i {
      position: absolute; left: 13px; top: 50%;
      transform: translateY(-50%); color: #9ca3af; font-size: 0.9rem;
    }
    .form-control {
      width: 100%; padding: 11px 12px 11px 38px;
      border: 2px solid #e5e7eb; border-radius: 11px;
      font-family: 'Nunito', sans-serif; font-size: 0.92rem;
      font-weight: 600; color: #1e293b; background: #f8fafc;
      transition: all 0.2s; outline: none;
    }
    .form-control:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(61,142,240,0.12);
      background: white;
    }
    select.form-control { cursor: pointer; }

    /* Student-only fields */
    .student-fields { display: none; }

    .btn-register {
      width: 100%; padding: 14px;
      background: linear-gradient(135deg, var(--primary), #1d4ed8);
      color: white; border: none; border-radius: 12px;
      font-family: 'Nunito', sans-serif; font-size: 1rem; font-weight: 800;
      cursor: pointer; transition: all 0.2s;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      margin-top: 8px;
    }
    .btn-register:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(61,142,240,0.4); }

    .login-link {
      text-align: center; margin-top: 20px;
      font-size: 0.88rem; font-weight: 700; color: #64748b;
    }
    .login-link a { color: var(--primary); }

    .flash-container { position: fixed; top: 24px; right: 24px; z-index: 999; }
    .flash {
      padding: 12px 20px; border-radius: 12px; margin-bottom: 8px;
      font-weight: 700; font-size: 0.88rem; box-shadow: 0 8px 24px rgba(0,0,0,0.1);
    }
    .flash.error { background: #fee2e2; color: #991b1b; border-left: 4px solid #ef4444; }
  </style>
</head>
<body>
  <div class="flash-container">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="flash {{ category }}">{{ message }}</div>
      {% endfor %}
    {% endwith %}
  </div>

  <div class="register-card">
    <div class="brand">
      <div class="brand-icon"><i class="fas fa-heartbeat"></i></div>
      <h1>Ravix</h1>
    </div>

    <h2>Criar conta 🎉</h2>
    <p class="subtitle">Junte-se à comunidade Ravix</p>

    <form method="POST" action="{{ url_for('register') }}">
      <!-- Role selection -->
      <div class="role-toggle">
        <div>
          <input type="radio" name="role" id="role-teacher" value="teacher" class="role-option" checked>
          <label for="role-teacher" class="role-label">
            <span class="ri">👩‍🏫</span>
            <span>Professor(a)</span>
            <small>Criar e gerir turmas</small>
          </label>
        </div>
        <div>
          <input type="radio" name="role" id="role-student" value="student" class="role-option">
          <label for="role-student" class="role-label">
            <span class="ri">🎒</span>
            <span>Aluno(a)</span>
            <small>Entrar em turmas</small>
          </label>
        </div>
      </div>

      <div class="form-grid">
        <div class="form-group full">
          <label>Nome completo</label>
          <div class="input-wrap">
            <i class="fas fa-user"></i>
            <input type="text" name="name" class="form-control" placeholder="Seu nome completo" required>
          </div>
        </div>

        <div class="form-group full">
          <label>E-mail</label>
          <div class="input-wrap">
            <i class="fas fa-envelope"></i>
            <input type="email" name="email" class="form-control" placeholder="seu@email.com" required>
          </div>
        </div>

        <div class="form-group full">
          <label>Senha</label>
          <div class="input-wrap">
            <i class="fas fa-lock"></i>
            <input type="password" name="password" class="form-control" placeholder="Mínimo 6 caracteres" required>
          </div>
        </div>

        <div class="form-group full">
          <label>Hospital / Instituição</label>
          <div class="input-wrap">
            <i class="fas fa-hospital"></i>
            <input type="text" name="hospital" class="form-control" placeholder="Nome do hospital">
          </div>
        </div>

        <!-- Student-specific -->
        <div class="form-group student-fields">
          <label>Ala / Enfermaria</label>
          <div class="input-wrap">
            <i class="fas fa-bed"></i>
            <input type="text" name="ward" class="form-control" placeholder="Ex: Pediatria Ala B">
          </div>
        </div>

        <div class="form-group student-fields">
          <label>Idade</label>
          <div class="input-wrap">
            <i class="fas fa-birthday-cake"></i>
            <input type="number" name="age" class="form-control" placeholder="Sua idade" min="4" max="30">
          </div>
        </div>
      </div>

      <button type="submit" class="btn-register">
        <i class="fas fa-user-plus"></i> Criar minha conta
      </button>
    </form>

    <div class="login-link">
      Já tem conta? <a href="{{ url_for('login') }}">Entrar aqui</a>
    </div>
  </div>

  <script>
    const studentFields = document.querySelectorAll('.student-fields');
    document.querySelectorAll('input[name="role"]').forEach(radio => {
      radio.addEventListener('change', () => {
        const isStudent = radio.value === 'student' && radio.checked;
        studentFields.forEach(f => f.style.display = isStudent ? 'block' : 'none');
      });
    });
  </script>
</body>
</html>
