<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Painel do Professor</title>
    <link rel="stylesheet" href="static/style.css">
</head>

<body>

<h2>Desempenho dos alunos</h2>

<ul id="listaAlunos"></ul>

<script>

fetch("/dados_alunos")
.then(res => res.json())
.then(dados => {

    let lista = document.getElementById("listaAlunos")
    lista.innerHTML = ""

    dados.forEach(aluno => {
        let item = document.createElement("li")
        item.innerHTML = aluno[0] + " - Pontos: " + aluno[1]
        lista.appendChild(item)
    })

})

</script>

</body>
</html>
